<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Media</title>
</head>
<body>
<script>
const TMDB_API_KEY = "2d1351cf74f73892042699d0431b799a";
const BARE_SERVER  = "https://bare-server.fly.dev"; // no trailing slash

async function searchTMDB(query) {
  const res  = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&include_adult=false`);
  const data = await res.json();
  return (data.results || []).filter(r => r.media_type !== "person").slice(0, 9);
}

// Fetch a URL through bare server v2 endpoint
async function fetchViaBare(targetUrl) {
  const url = new URL(targetUrl);

  const res = await fetch(`${BARE_SERVER}/v2/`, {
    method: "GET",
    headers: {
      "x-bare-url":              targetUrl,
      "x-bare-headers":          JSON.stringify({
        "Host":            url.host,
        "User-Agent":      "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
        "Accept":          "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
        "Accept-Language": "en-US,en;q=0.9",
      }),
      "x-bare-forward-headers":  JSON.stringify(["accept-encoding", "connection"]),
      "x-bare-pass-headers":     JSON.stringify(["content-encoding", "content-length"]),
    },
  });

  if (!res.ok) throw new Error(`Bare server error: ${res.status}`);
  return res.text();
}

async function start() {
  const query = prompt("What do you want to watch?");
  if (!query || !query.trim()) return;

  let results;
  try {
    results = await searchTMDB(query.trim());
  } catch (e) {
    alert("Search failed. Check your TMDB API key."); return;
  }

  if (!results.length) { alert("No results found for: " + query); return; }

  const list = results.map((r, i) => {
    const title = r.title || r.name || "Unknown";
    const year  = (r.release_date || r.first_air_date || "").slice(0, 4);
    const type  = r.media_type === "movie" ? "Movie" : "TV";
    return `[${i + 1}] ${title}${year ? " (" + year + ")" : ""} — ${type}`;
  }).join("\n");

  const pick = prompt(`Results for "${query}":\n\n${list}\n\nEnter a number:`);
  if (!pick) return;

  const idx = parseInt(pick, 10) - 1;
  if (isNaN(idx) || idx < 0 || idx >= results.length) { alert("Invalid selection."); return; }

  const r = results[idx];
  let cinemaUrl;

  if (r.media_type === "movie") {
    cinemaUrl = `https://cinemaos.tech/player/${r.id}`;
  } else {
    const season  = prompt("Season number:", "1") || "1";
    const episode = prompt("Episode number:", "1") || "1";
    cinemaUrl = `https://cinemaos.tech/player/${r.id}/${season}/${episode}`;
  }

  // Open about:blank synchronously before any await
  const win = window.open("about:blank", "_blank");
  if (!win) { alert("Please allow popups and try again."); return; }

  // Write loading screen immediately so window stays open
  win.document.open();
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<style>*{margin:0;padding:0}html,body{width:100%;height:100%;background:#0a0a0a;display:flex;align-items:center;justify-content:center;color:#444;font-family:monospace;font-size:13px}</style>
</head><body>loading...</body></html>`);
  win.document.close();

  // Fetch CinemaOS page through bare server, write it into the window
  try {
    const html = await fetchViaBare(cinemaUrl);

    // Rewrite root-relative URLs to absolute cinemaos.tech URLs
    const rewritten = html
      .replace(/(href|src)=(["'])\/(?!\/)/g, `$1=$2https://cinemaos.tech/`)
      .replace(/url\(\s*['"]?\//g, `url(https://cinemaos.tech/`);

    win.document.open();
    win.document.write(rewritten);
    win.document.close();

    // Inject base tag so any remaining relative links resolve correctly
    try {
      const base = win.document.createElement("base");
      base.href = "https://cinemaos.tech";
      win.document.head.insertBefore(base, win.document.head.firstChild);
    } catch(e) {}

  } catch (err) {
    console.error("Bare fetch failed:", err);
    win.document.open();
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<style>*{margin:0;padding:0}html,body{background:#0a0a0a;color:#555;font-family:monospace;font-size:13px;
display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:8px}</style>
</head><body><div>proxy error</div><div style="color:#333;font-size:11px">${err.message}</div></body></html>`);
    win.document.close();
  }
}

window.addEventListener("load", start);
</script>
</body>
</html>
